<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="24" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity=".06" stroke="#fff" stroke-width=".5" fill="none">
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="50" y1="0" x2="50" y2="300"/><line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="250" y1="0" x2="250" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="350" y1="0" x2="350" y2="300"/>
  </g>
  <!-- BLU text -->
  <text x="200" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900"
        font-size="110" fill="none" stroke="#fff" stroke-width="2.5" letter-spacing="8">BLU</text>
  <!-- LAPTOP text -->
  <text x="285" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600"
        font-size="32" fill="#fff" opacity=".85" letter-spacing="6">LAPTOP</text>
  <!-- Circuit dots -->
  <g fill="#fff">
    <circle cx="82" cy="85" r="4"/><circle cx="135" cy="85" r="4"/>
    <circle cx="200" cy="85" r="4"/><circle cx="265" cy="85" r="4"/>
    <circle cx="318" cy="85" r="4"/>
    <circle cx="108" cy="175" r="4"/><circle cx="175" cy="175" r="3.5"/>
    <circle cx="318" cy="175" r="4"/><circle cx="82" cy="175" r="3.5"/>
    <circle cx="135" cy="220" r="3"/><circle cx="265" cy="220" r="3"/>
  </g>
  <!-- Circuit lines -->
  <g stroke="#fff" stroke-width="1.5" opacity=".25" fill="none">
    <line x1="82" y1="85" x2="135" y2="85"/>
    <line x1="200" y1="85" x2="265" y2="85"/>
    <line x1="265" y1="85" x2="318" y2="85"/>
    <line x1="82" y1="85" x2="82" y2="175"/>
    <line x1="318" y1="85" x2="318" y2="175"/>
    <line x1="135" y1="85" x2="135" y2="220"/>
    <line x1="265" y1="85" x2="265" y2="220"/>
  </g>
</svg>
